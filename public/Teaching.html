<script>
async function loadReferences() {
  try {
    const res = await fetch("/api/references", { credentials: "include" });

    if (!res.ok) {
      console.error("Could not load references:", res.status);
      return;
    }

    const links = await res.json();

    document.querySelectorAll("a[data-ref]").forEach(a => {
      const title = a.getAttribute("data-ref");
      const match = links.find(link => link.title === title);

      if (match) {
        a.href = match.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      } else {
        console.warn("No match for:", title);
        // optional: visually show it's missing
        // a.style.opacity = "0.5";
      }
    });

  } catch (err) {
    console.error("Error loading references:", err);
  }
}

loadReferences();
</script>
